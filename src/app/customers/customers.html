<div class="customers-page">

  <div class="customers-header">
    <h2>Customers</h2>
  </div>

  <div class="top-bar">
    <input type="text" class="search-input" placeholder="Search by name or mobile..." [(ngModel)]="searchText" />

    <button class="add-btn" (click)="addCustomer()">➕</button>
  </div>

  <hr />
  <table class="customers-table" *ngIf="filteredCustomers.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>WhatsApp Number</th>
        <th>Address</th>
        <th>Last Order Date</th>
        <th>Action</th>

      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of filteredCustomers, let i = index" (click)="openCustomer(c.id)">
        <td>{{ i + 1 }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.whatsapp }}</td>
        <td>{{ c.address }}</td>
        <td> {{ c.orders?.length ? (c.orders[0].date | date:'dd MMM yyyy') : '-' }}</td>
        <td class="action-col">
  <div class="action-buttons">
  
    <button class="delete-btn"
            (click)="deleteCustomer(c._id); $event.stopPropagation()">
      Delete
    </button>
  </div>
</td>


      </tr>
    </tbody>
  </table>
  <p class="empty" *ngIf="filteredCustomers.length === 0">
    No customers found
  </p>
